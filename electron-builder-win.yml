appId: com.ansh.ytdownloader
productName: YT Downloader

compression: maximum
publish: null

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - electron/**/*
  - package.json
  - "!**/*.map"

extraResources:
  - from: resources
    to: resources
    filter:
      - win32/**

asar: true

win:
  target:
    - nsis
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true