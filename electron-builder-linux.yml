appId: com.ansh.ytdownloader
productName: YT Downloader

compression: maximum
publish: null

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - electron/**/*
  - package.json
  - "!**/*.map"

extraResources:
  - from: resources
    to: resources
    filter:
      - linux/**

asar: true

linux:
  target:
    - AppImage
  category: Utility
  icon: build/icon.png